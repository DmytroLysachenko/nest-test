name: Deploy Prod On Main

on:
  workflow_run:
    workflows: ["CI Verify"]
    types: [completed]

permissions:
  contents: read
  id-token: write

concurrency:
  group: prod-deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  detect-changes:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    outputs:
      deploy_api: ${{ steps.changes.outputs.deploy_api }}
      deploy_worker: ${{ steps.changes.outputs.deploy_worker }}
      deploy_web: ${{ steps.changes.outputs.deploy_web }}
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 2

      - id: changes
        name: Detect changed services
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse "${RELEASE_SHA}^" >/dev/null 2>&1; then
            CHANGED="$(git diff --name-only "${RELEASE_SHA}^" "${RELEASE_SHA}")"
          else
            CHANGED="$(git show --name-only --pretty='' "${RELEASE_SHA}")"
          fi

          echo "Changed files:"
          echo "${CHANGED}"

          deploy_api=false
          deploy_worker=false
          deploy_web=false

          if echo "${CHANGED}" | grep -Eq '^(pnpm-lock.yaml|pnpm-workspace.yaml|package.json|turbo.json|tsconfig(\..+)?\.json|\.github/workflows/deploy-prod-on-main.yml|scripts/deploy-cloud-run-prod.sh|scripts/verify-deployment.sh)'; then
            deploy_api=true
            deploy_worker=true
            deploy_web=true
          fi

          if echo "${CHANGED}" | grep -Eq '^(apps/api/|packages/db/)'; then
            deploy_api=true
          fi

          if echo "${CHANGED}" | grep -Eq '^(apps/worker/|packages/db/)'; then
            deploy_worker=true
          fi

          if echo "${CHANGED}" | grep -Eq '^(apps/web/|packages/ui/)'; then
            deploy_web=true
          fi

          echo "deploy_api=${deploy_api}" >> "${GITHUB_OUTPUT}"
          echo "deploy_worker=${deploy_worker}" >> "${GITHUB_OUTPUT}"
          echo "deploy_web=${deploy_web}" >> "${GITHUB_OUTPUT}"

  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Validate build inputs
        run: |
          test -n "${RELEASE_SHA}" || (echo "Missing RELEASE_SHA from workflow_run event" && exit 1)
          echo "${RELEASE_SHA}" | grep -Eq '^[0-9a-f]{40}$' || (echo "RELEASE_SHA must be a full 40-char git SHA" && exit 1)
          test -n "${{ vars.GCP_PROJECT_ID }}" || (echo "Missing vars.GCP_PROJECT_ID" && exit 1)
          test -n "${{ vars.GCP_REGION }}" || (echo "Missing vars.GCP_REGION" && exit 1)
          test -n "${{ vars.GAR_REPOSITORY }}" || (echo "Missing vars.GAR_REPOSITORY" && exit 1)

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          IMAGE_BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}"
          docker build -f apps/api/Dockerfile -t ${IMAGE_BASE}/api:${RELEASE_SHA} .
          docker push ${IMAGE_BASE}/api:${RELEASE_SHA}

  build-worker:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Worker image
        run: |
          IMAGE_BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}"
          docker build -f apps/worker/Dockerfile -t ${IMAGE_BASE}/worker:${RELEASE_SHA} .
          docker push ${IMAGE_BASE}/worker:${RELEASE_SHA}

  build-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Web image
        run: |
          IMAGE_BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ vars.GCP_API_BASE_URL }}/api" \
            --build-arg NEXT_PUBLIC_WORKER_URL="${{ vars.GCP_WORKER_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_ENABLE_TESTER="false" \
            --build-arg NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID="${{ vars.GOOGLE_OAUTH_CLIENT_ID }}" \
            -f apps/web/Dockerfile -t ${IMAGE_BASE}/web:${RELEASE_SHA} .
          docker push ${IMAGE_BASE}/web:${RELEASE_SHA}

  deploy:
    needs: [detect-changes, build-api, build-worker, build-web]
    if: >
      always() &&
      (needs.detect-changes.outputs.deploy_api == 'true' ||
      needs.detect-changes.outputs.deploy_worker == 'true' ||
      needs.detect-changes.outputs.deploy_web == 'true') &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      (needs.build-worker.result == 'success' || needs.build-worker.result == 'skipped') &&
      (needs.build-web.result == 'success' || needs.build-web.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Validate deployment inputs
        run: |
          test -n "${RELEASE_SHA}" || (echo "Missing RELEASE_SHA from workflow_run event" && exit 1)
          echo "${RELEASE_SHA}" | grep -Eq '^[0-9a-f]{40}$' || (echo "RELEASE_SHA must be a full 40-char git SHA" && exit 1)
          test -n "${{ vars.GCP_PROJECT_ID }}" || (echo "Missing vars.GCP_PROJECT_ID" && exit 1)
          test -n "${{ vars.GCP_REGION }}" || (echo "Missing vars.GCP_REGION" && exit 1)
          test -n "${{ vars.GAR_REPOSITORY }}" || (echo "Missing vars.GAR_REPOSITORY" && exit 1)
          test -n "${{ vars.GCP_API_SERVICE }}" || (echo "Missing vars.GCP_API_SERVICE" && exit 1)
          test -n "${{ vars.GCP_WORKER_SERVICE }}" || (echo "Missing vars.GCP_WORKER_SERVICE" && exit 1)
          test -n "${{ vars.GCP_WEB_SERVICE }}" || (echo "Missing vars.GCP_WEB_SERVICE" && exit 1)
          test -n "${{ vars.GCS_BUCKET }}" || (echo "Missing vars.GCS_BUCKET" && exit 1)
          test -n "${{ vars.GOOGLE_OAUTH_CLIENT_ID }}" || (echo "Missing vars.GOOGLE_OAUTH_CLIENT_ID" && exit 1)
          test -n "${{ secrets.SCHEDULER_AUTH_TOKEN }}" || (echo "Missing secrets.SCHEDULER_AUTH_TOKEN" && exit 1)

      - name: Deploy production services
        run: |
          chmod +x ./scripts/deploy-cloud-run-prod.sh
          chmod +x ./scripts/verify-deployment.sh
          ./scripts/deploy-cloud-run-prod.sh
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
          RELEASE_SHA: ${{ env.RELEASE_SHA }}
          DEPLOY_API: ${{ needs.detect-changes.outputs.deploy_api }}
          DEPLOY_WORKER: ${{ needs.detect-changes.outputs.deploy_worker }}
          DEPLOY_WEB: ${{ needs.detect-changes.outputs.deploy_web }}
          GCP_API_SERVICE: ${{ vars.GCP_API_SERVICE }}
          GCP_WORKER_SERVICE: ${{ vars.GCP_WORKER_SERVICE }}
          GCP_WEB_SERVICE: ${{ vars.GCP_WEB_SERVICE }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          GCP_API_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_API_RUNTIME_SERVICE_ACCOUNT }}
          GCP_WORKER_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_WORKER_RUNTIME_SERVICE_ACCOUNT }}
          GCP_WEB_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_WEB_RUNTIME_SERVICE_ACCOUNT }}
          ACCESS_TOKEN_EXPIRATION: ${{ vars.ACCESS_TOKEN_EXPIRATION }}
          REFRESH_TOKEN_EXPIRATION: ${{ vars.REFRESH_TOKEN_EXPIRATION }}
          MAIL_HOST: ${{ vars.MAIL_HOST }}
          MAIL_PORT: ${{ vars.MAIL_PORT }}
          MAIL_SECURE: ${{ vars.MAIL_SECURE }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          WORKER_TASKS_QUEUE: ${{ vars.WORKER_TASKS_QUEUE }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          WORKER_SHARED_TOKEN: ${{ secrets.WORKER_SHARED_TOKEN }}
          WORKER_CALLBACK_TOKEN: ${{ secrets.WORKER_CALLBACK_TOKEN }}
          SCHEDULER_AUTH_TOKEN: ${{ secrets.SCHEDULER_AUTH_TOKEN }}
