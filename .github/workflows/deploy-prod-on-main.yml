name: Deploy Prod On Main

on:
  workflow_run:
    workflows: ["CI Verify"]
    types: [completed]

permissions:
  contents: read
  id-token: write

concurrency:
  group: prod-deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  validate-contract:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      GCP_API_SERVICE: ${{ vars.GCP_API_SERVICE }}
      GCP_WORKER_SERVICE: ${{ vars.GCP_WORKER_SERVICE }}
      GCP_WEB_SERVICE: ${{ vars.GCP_WEB_SERVICE }}
      GCS_BUCKET: ${{ vars.GCS_BUCKET }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      SCHEDULER_AUTH_TOKEN: ${{ secrets.SCHEDULER_AUTH_TOKEN }}
      OPS_INTERNAL_TOKEN: ${{ secrets.OPS_INTERNAL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}
      - name: Validate deploy contract
        run: |
          chmod +x ./scripts/validate-deploy-contract.sh
          ./scripts/validate-deploy-contract.sh deploy-prod-on-main

  detect-changes:
    needs: validate-contract
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    outputs:
      deploy_api: ${{ steps.changes.outputs.deploy_api }}
      deploy_worker: ${{ steps.changes.outputs.deploy_worker }}
      deploy_web: ${{ steps.changes.outputs.deploy_web }}
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 2

      - id: changes
        name: Detect changed services
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse "${RELEASE_SHA}^" >/dev/null 2>&1; then
            CHANGED="$(git diff --name-only "${RELEASE_SHA}^" "${RELEASE_SHA}")"
          else
            CHANGED="$(git show --name-only --pretty='' "${RELEASE_SHA}")"
          fi

          echo "Changed files:"
          echo "${CHANGED}"

          deploy_api=false
          deploy_worker=false
          deploy_web=false

          if echo "${CHANGED}" | grep -Eq '^(pnpm-lock.yaml|pnpm-workspace.yaml|package.json|turbo.json|tsconfig(\..+)?\.json|\.github/workflows/deploy-prod-on-main.yml|scripts/deploy-cloud-run-prod.sh|scripts/verify-deployment.sh)'; then
            deploy_api=true
            deploy_worker=true
            deploy_web=true
          fi

          if echo "${CHANGED}" | grep -Eq '^(apps/api/|packages/db/)'; then
            deploy_api=true
          fi

          if echo "${CHANGED}" | grep -Eq '^(apps/worker/|packages/db/)'; then
            deploy_worker=true
          fi

          if echo "${CHANGED}" | grep -Eq '^(apps/web/|packages/ui/)'; then
            deploy_web=true
          fi

          echo "deploy_api=${deploy_api}" >> "${GITHUB_OUTPUT}"
          echo "deploy_worker=${deploy_worker}" >> "${GITHUB_OUTPUT}"
          echo "deploy_web=${deploy_web}" >> "${GITHUB_OUTPUT}"

  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Validate build inputs
        run: |
          test -n "${RELEASE_SHA}" || (echo "Missing RELEASE_SHA from workflow_run event" && exit 1)
          echo "${RELEASE_SHA}" | grep -Eq '^[0-9a-f]{40}$' || (echo "RELEASE_SHA must be a full 40-char git SHA" && exit 1)
          test -n "${{ vars.GCP_PROJECT_ID }}" || (echo "Missing GCP_PROJECT_ID" && exit 1)
          test -n "${{ vars.GCP_REGION }}" || (echo "Missing GCP_REGION" && exit 1)
          test -n "${{ vars.GAR_REPOSITORY }}" || (echo "Missing GAR_REPOSITORY" && exit 1)

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          IMAGE_BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}"
          docker build -f apps/api/Dockerfile -t ${IMAGE_BASE}/api:${RELEASE_SHA} .
          docker push ${IMAGE_BASE}/api:${RELEASE_SHA}

  build-worker:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Worker image
        run: |
          IMAGE_BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}"
          docker build -f apps/worker/Dockerfile -t ${IMAGE_BASE}/worker:${RELEASE_SHA} .
          docker push ${IMAGE_BASE}/worker:${RELEASE_SHA}

  build-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Web image
        run: |
          IMAGE_BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ vars.GCP_API_BASE_URL }}/api" \
            --build-arg NEXT_PUBLIC_WORKER_URL="${{ vars.GCP_WORKER_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_ENABLE_TESTER="false" \
            --build-arg NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID="${{ vars.GOOGLE_OAUTH_CLIENT_ID }}" \
            -f apps/web/Dockerfile -t ${IMAGE_BASE}/web:${RELEASE_SHA} .
          docker push ${IMAGE_BASE}/web:${RELEASE_SHA}

  deploy:
    needs: [detect-changes, build-api, build-worker, build-web]
    if: >
      always() &&
      (needs.detect-changes.outputs.deploy_api == 'true' ||
      needs.detect-changes.outputs.deploy_worker == 'true' ||
      needs.detect-changes.outputs.deploy_web == 'true') &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      (needs.build-worker.result == 'success' || needs.build-worker.result == 'skipped') &&
      (needs.build-web.result == 'success' || needs.build-web.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Validate deployment inputs
        run: |
          test -n "${RELEASE_SHA}" || (echo "Missing RELEASE_SHA from workflow_run event" && exit 1)
          echo "${RELEASE_SHA}" | grep -Eq '^[0-9a-f]{40}$' || (echo "RELEASE_SHA must be a full 40-char git SHA" && exit 1)
          test -n "${{ vars.GCP_PROJECT_ID }}" || (echo "Missing GCP_PROJECT_ID" && exit 1)
          test -n "${{ vars.GCP_REGION }}" || (echo "Missing GCP_REGION" && exit 1)
          test -n "${{ vars.GAR_REPOSITORY }}" || (echo "Missing GAR_REPOSITORY" && exit 1)
          test -n "${{ vars.GCP_API_SERVICE }}" || (echo "Missing GCP_API_SERVICE" && exit 1)
          test -n "${{ vars.GCP_WORKER_SERVICE }}" || (echo "Missing GCP_WORKER_SERVICE" && exit 1)
          test -n "${{ vars.GCP_WEB_SERVICE }}" || (echo "Missing GCP_WEB_SERVICE" && exit 1)
          test -n "${{ vars.GCS_BUCKET }}" || (echo "Missing GCS_BUCKET" && exit 1)
          test -n "${{ vars.GEMINI_MODEL }}" || (echo "Missing GEMINI_MODEL" && exit 1)
          test -n "${{ vars.GOOGLE_OAUTH_CLIENT_ID }}" || (echo "Missing GOOGLE_OAUTH_CLIENT_ID" && exit 1)
          test -n "${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}" || (echo "Missing secrets.GOOGLE_OAUTH_CLIENT_SECRET" && exit 1)
          test -n "${{ secrets.SCHEDULER_AUTH_TOKEN }}" || (echo "Missing secrets.SCHEDULER_AUTH_TOKEN" && exit 1)
          test -n "${{ secrets.OPS_INTERNAL_TOKEN }}" || (echo "Missing secrets.OPS_INTERNAL_TOKEN" && exit 1)

      - name: Deploy production services
        run: |
          chmod +x ./scripts/deploy-cloud-run-prod.sh
          chmod +x ./scripts/verify-deployment.sh
          ./scripts/deploy-cloud-run-prod.sh
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
          RELEASE_SHA: ${{ env.RELEASE_SHA }}
          DEPLOY_API: ${{ needs.detect-changes.outputs.deploy_api }}
          DEPLOY_WORKER: ${{ needs.detect-changes.outputs.deploy_worker }}
          DEPLOY_WEB: ${{ needs.detect-changes.outputs.deploy_web }}
          GCP_API_SERVICE: ${{ vars.GCP_API_SERVICE }}
          GCP_WORKER_SERVICE: ${{ vars.GCP_WORKER_SERVICE }}
          GCP_WEB_SERVICE: ${{ vars.GCP_WEB_SERVICE }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GCP_API_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_API_RUNTIME_SERVICE_ACCOUNT }}
          GCP_WORKER_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_WORKER_RUNTIME_SERVICE_ACCOUNT }}
          GCP_WEB_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_WEB_RUNTIME_SERVICE_ACCOUNT }}
          ACCESS_TOKEN_EXPIRATION: ${{ vars.ACCESS_TOKEN_EXPIRATION }}
          REFRESH_TOKEN_EXPIRATION: ${{ vars.REFRESH_TOKEN_EXPIRATION }}
          MAIL_HOST: ${{ vars.MAIL_HOST }}
          MAIL_PORT: ${{ vars.MAIL_PORT }}
          MAIL_SECURE: ${{ vars.MAIL_SECURE }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          API_THROTTLE_TTL_MS: ${{ vars.API_THROTTLE_TTL_MS }}
          API_THROTTLE_LIMIT: ${{ vars.API_THROTTLE_LIMIT }}
          AUTH_LOGIN_THROTTLE_TTL_MS: ${{ vars.AUTH_LOGIN_THROTTLE_TTL_MS }}
          AUTH_LOGIN_THROTTLE_LIMIT: ${{ vars.AUTH_LOGIN_THROTTLE_LIMIT }}
          AUTH_REFRESH_THROTTLE_TTL_MS: ${{ vars.AUTH_REFRESH_THROTTLE_TTL_MS }}
          AUTH_REFRESH_THROTTLE_LIMIT: ${{ vars.AUTH_REFRESH_THROTTLE_LIMIT }}
          AUTH_REGISTER_THROTTLE_TTL_MS: ${{ vars.AUTH_REGISTER_THROTTLE_TTL_MS }}
          AUTH_REGISTER_THROTTLE_LIMIT: ${{ vars.AUTH_REGISTER_THROTTLE_LIMIT }}
          AUTH_OTP_THROTTLE_TTL_MS: ${{ vars.AUTH_OTP_THROTTLE_TTL_MS }}
          AUTH_OTP_THROTTLE_LIMIT: ${{ vars.AUTH_OTP_THROTTLE_LIMIT }}
          WORKER_REQUEST_TIMEOUT_MS: ${{ vars.WORKER_REQUEST_TIMEOUT_MS }}
          WORKER_TASK_MAX_PAYLOAD_BYTES: ${{ vars.WORKER_TASK_MAX_PAYLOAD_BYTES }}
          API_BODY_LIMIT: ${{ vars.API_BODY_LIMIT }}
          DISK_HEALTH_THRESHOLD: ${{ vars.DISK_HEALTH_THRESHOLD }}
          SCHEDULER_TRIGGER_BATCH_SIZE: ${{ vars.SCHEDULER_TRIGGER_BATCH_SIZE }}
          WORKSPACE_SUMMARY_CACHE_TTL_SEC: ${{ vars.WORKSPACE_SUMMARY_CACHE_TTL_SEC }}
          JOB_SOURCE_DIAGNOSTICS_WINDOW_HOURS: ${{ vars.JOB_SOURCE_DIAGNOSTICS_WINDOW_HOURS }}
          DOCUMENT_DIAGNOSTICS_WINDOW_HOURS: ${{ vars.DOCUMENT_DIAGNOSTICS_WINDOW_HOURS }}
          SCRAPE_DB_REUSE_HOURS: ${{ vars.SCRAPE_DB_REUSE_HOURS }}
          SCRAPE_MAX_ACTIVE_RUNS_PER_USER: ${{ vars.SCRAPE_MAX_ACTIVE_RUNS_PER_USER }}
          SCRAPE_DAILY_ENQUEUE_LIMIT_PER_USER: ${{ vars.SCRAPE_DAILY_ENQUEUE_LIMIT_PER_USER }}
          SCRAPE_ENQUEUE_IDEMPOTENCY_TTL_SEC: ${{ vars.SCRAPE_ENQUEUE_IDEMPOTENCY_TTL_SEC }}
          SCRAPE_MAX_RETRY_CHAIN_DEPTH: ${{ vars.SCRAPE_MAX_RETRY_CHAIN_DEPTH }}
          SCRAPE_STALE_PENDING_MINUTES: ${{ vars.SCRAPE_STALE_PENDING_MINUTES }}
          SCRAPE_STALE_RUNNING_MINUTES: ${{ vars.SCRAPE_STALE_RUNNING_MINUTES }}
          AUTO_SCORE_ON_INGEST: ${{ vars.AUTO_SCORE_ON_INGEST }}
          AUTO_SCORE_CONCURRENCY: ${{ vars.AUTO_SCORE_CONCURRENCY }}
          AUTO_SCORE_MIN_SCORE: ${{ vars.AUTO_SCORE_MIN_SCORE }}
          AUTO_SCORE_RETRY_ATTEMPTS: ${{ vars.AUTO_SCORE_RETRY_ATTEMPTS }}
          NOTEBOOK_APPROX_VIOLATION_PENALTY: ${{ vars.NOTEBOOK_APPROX_VIOLATION_PENALTY }}
          NOTEBOOK_APPROX_MAX_VIOLATION_PENALTY: ${{ vars.NOTEBOOK_APPROX_MAX_VIOLATION_PENALTY }}
          NOTEBOOK_APPROX_SCORED_BONUS: ${{ vars.NOTEBOOK_APPROX_SCORED_BONUS }}
          NOTEBOOK_EXPLORE_UNSCORED_BASE: ${{ vars.NOTEBOOK_EXPLORE_UNSCORED_BASE }}
          NOTEBOOK_EXPLORE_RECENCY_WEIGHT: ${{ vars.NOTEBOOK_EXPLORE_RECENCY_WEIGHT }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          WORKER_TASKS_QUEUE: ${{ vars.WORKER_TASKS_QUEUE }}
          WORKER_TASKS_DLQ: ${{ vars.WORKER_TASKS_DLQ }}
          TASKS_MAX_ATTEMPTS: ${{ vars.TASKS_MAX_ATTEMPTS }}
          TASKS_MIN_BACKOFF_SEC: ${{ vars.TASKS_MIN_BACKOFF_SEC }}
          TASKS_MAX_BACKOFF_SEC: ${{ vars.TASKS_MAX_BACKOFF_SEC }}
          TASKS_MAX_DOUBLINGS: ${{ vars.TASKS_MAX_DOUBLINGS }}
          TASKS_MAX_RETRY_DURATION_SEC: ${{ vars.TASKS_MAX_RETRY_DURATION_SEC }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          WORKER_ALLOWED_ORIGINS: ${{ vars.WORKER_ALLOWED_ORIGINS }}
          WORKER_CPU: ${{ vars.WORKER_CPU }}
          WORKER_MEMORY: ${{ vars.WORKER_MEMORY }}
          WORKER_MAX_INSTANCES: ${{ vars.WORKER_MAX_INSTANCES }}
          WORKER_MIN_INSTANCES: ${{ vars.WORKER_MIN_INSTANCES }}
          WEB_QUERY_STALE_TIME_MS: ${{ vars.WEB_QUERY_STALE_TIME_MS }}
          WEB_QUERY_REFETCH_ON_WINDOW_FOCUS: ${{ vars.WEB_QUERY_REFETCH_ON_WINDOW_FOCUS }}
          WEB_QUERY_DIAGNOSTICS_REFETCH_MS: ${{ vars.WEB_QUERY_DIAGNOSTICS_REFETCH_MS }}
          SCHEDULER_JOB_NAME: ${{ vars.SCHEDULER_JOB_NAME }}
          SCHEDULER_CRON: ${{ vars.SCHEDULER_CRON }}
          SCHEDULER_TIMEZONE: ${{ vars.SCHEDULER_TIMEZONE }}
          OPS_RECONCILE_JOB_NAME: ${{ vars.OPS_RECONCILE_JOB_NAME }}
          OPS_RECONCILE_CRON: ${{ vars.OPS_RECONCILE_CRON }}
          OPS_RECONCILE_TIMEZONE: ${{ vars.OPS_RECONCILE_TIMEZONE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          WORKER_SHARED_TOKEN: ${{ secrets.WORKER_SHARED_TOKEN }}
          WORKER_CALLBACK_TOKEN: ${{ secrets.WORKER_CALLBACK_TOKEN }}
          SCHEDULER_AUTH_TOKEN: ${{ secrets.SCHEDULER_AUTH_TOKEN }}
          OPS_INTERNAL_TOKEN: ${{ secrets.OPS_INTERNAL_TOKEN }}

      - name: Upload deployment verify summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-verify-summary
          path: deployment-verify-summary.json
          if-no-files-found: warn
      - name: Upload deployment release metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-release-metadata
          path: deployment-release-metadata.json
          if-no-files-found: warn
