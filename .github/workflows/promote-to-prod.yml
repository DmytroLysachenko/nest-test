name: Promote To Prod

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: 'Release commit SHA to promote'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Validate release input
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
          GCP_API_SERVICE: ${{ vars.GCP_API_SERVICE }}
          GCP_WORKER_SERVICE: ${{ vars.GCP_WORKER_SERVICE }}
          GCP_WEB_SERVICE: ${{ vars.GCP_WEB_SERVICE }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SCHEDULER_AUTH_TOKEN: ${{ secrets.SCHEDULER_AUTH_TOKEN }}
          OPS_INTERNAL_TOKEN: ${{ secrets.OPS_INTERNAL_TOKEN }}
        run: |
          chmod +x ./scripts/validate-deploy-contract.sh
          ./scripts/validate-deploy-contract.sh promote-to-prod
          test -n "${{ inputs.release_sha }}" || (echo "release_sha is required" && exit 1)
          echo "${{ inputs.release_sha }}" | grep -Eq '^[0-9a-f]{40}$' || (echo "release_sha must be a full 40-char git SHA" && exit 1)
          echo "Promoting release SHA=${{ inputs.release_sha }}"
      - name: Deploy promoted release
        run: |
          chmod +x ./scripts/deploy-cloud-run-prod.sh
          chmod +x ./scripts/verify-deployment.sh
          ./scripts/deploy-cloud-run-prod.sh
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          DEPLOY_API: true
          DEPLOY_WORKER: true
          DEPLOY_WEB: true
          DEPLOY_METADATA_FILE: promote-release-metadata.json
          VERIFY_SUMMARY_FILE: promote-verify-summary.json
          GCP_API_SERVICE: ${{ vars.GCP_API_SERVICE }}
          GCP_WORKER_SERVICE: ${{ vars.GCP_WORKER_SERVICE }}
          GCP_WEB_SERVICE: ${{ vars.GCP_WEB_SERVICE }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GCP_API_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_API_RUNTIME_SERVICE_ACCOUNT }}
          GCP_WORKER_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_WORKER_RUNTIME_SERVICE_ACCOUNT }}
          GCP_WEB_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_WEB_RUNTIME_SERVICE_ACCOUNT }}
          ACCESS_TOKEN_EXPIRATION: ${{ vars.ACCESS_TOKEN_EXPIRATION }}
          REFRESH_TOKEN_EXPIRATION: ${{ vars.REFRESH_TOKEN_EXPIRATION }}
          MAIL_HOST: ${{ vars.MAIL_HOST }}
          MAIL_PORT: ${{ vars.MAIL_PORT }}
          MAIL_SECURE: ${{ vars.MAIL_SECURE }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          API_THROTTLE_TTL_MS: ${{ vars.API_THROTTLE_TTL_MS }}
          API_THROTTLE_LIMIT: ${{ vars.API_THROTTLE_LIMIT }}
          AUTH_LOGIN_THROTTLE_TTL_MS: ${{ vars.AUTH_LOGIN_THROTTLE_TTL_MS }}
          AUTH_LOGIN_THROTTLE_LIMIT: ${{ vars.AUTH_LOGIN_THROTTLE_LIMIT }}
          AUTH_REFRESH_THROTTLE_TTL_MS: ${{ vars.AUTH_REFRESH_THROTTLE_TTL_MS }}
          AUTH_REFRESH_THROTTLE_LIMIT: ${{ vars.AUTH_REFRESH_THROTTLE_LIMIT }}
          AUTH_REGISTER_THROTTLE_TTL_MS: ${{ vars.AUTH_REGISTER_THROTTLE_TTL_MS }}
          AUTH_REGISTER_THROTTLE_LIMIT: ${{ vars.AUTH_REGISTER_THROTTLE_LIMIT }}
          AUTH_OTP_THROTTLE_TTL_MS: ${{ vars.AUTH_OTP_THROTTLE_TTL_MS }}
          AUTH_OTP_THROTTLE_LIMIT: ${{ vars.AUTH_OTP_THROTTLE_LIMIT }}
          WORKER_REQUEST_TIMEOUT_MS: ${{ vars.WORKER_REQUEST_TIMEOUT_MS }}
          WORKER_TASK_MAX_PAYLOAD_BYTES: ${{ vars.WORKER_TASK_MAX_PAYLOAD_BYTES }}
          API_BODY_LIMIT: ${{ vars.API_BODY_LIMIT }}
          DISK_HEALTH_THRESHOLD: ${{ vars.DISK_HEALTH_THRESHOLD }}
          SCHEDULER_TRIGGER_BATCH_SIZE: ${{ vars.SCHEDULER_TRIGGER_BATCH_SIZE }}
          WORKSPACE_SUMMARY_CACHE_TTL_SEC: ${{ vars.WORKSPACE_SUMMARY_CACHE_TTL_SEC }}
          JOB_SOURCE_DIAGNOSTICS_WINDOW_HOURS: ${{ vars.JOB_SOURCE_DIAGNOSTICS_WINDOW_HOURS }}
          DOCUMENT_DIAGNOSTICS_WINDOW_HOURS: ${{ vars.DOCUMENT_DIAGNOSTICS_WINDOW_HOURS }}
          SCRAPE_DB_REUSE_HOURS: ${{ vars.SCRAPE_DB_REUSE_HOURS }}
          SCRAPE_MAX_ACTIVE_RUNS_PER_USER: ${{ vars.SCRAPE_MAX_ACTIVE_RUNS_PER_USER }}
          SCRAPE_DAILY_ENQUEUE_LIMIT_PER_USER: ${{ vars.SCRAPE_DAILY_ENQUEUE_LIMIT_PER_USER }}
          SCRAPE_ENQUEUE_IDEMPOTENCY_TTL_SEC: ${{ vars.SCRAPE_ENQUEUE_IDEMPOTENCY_TTL_SEC }}
          SCRAPE_MAX_RETRY_CHAIN_DEPTH: ${{ vars.SCRAPE_MAX_RETRY_CHAIN_DEPTH }}
          SCRAPE_STALE_PENDING_MINUTES: ${{ vars.SCRAPE_STALE_PENDING_MINUTES }}
          SCRAPE_STALE_RUNNING_MINUTES: ${{ vars.SCRAPE_STALE_RUNNING_MINUTES }}
          AUTO_SCORE_ON_INGEST: ${{ vars.AUTO_SCORE_ON_INGEST }}
          AUTO_SCORE_CONCURRENCY: ${{ vars.AUTO_SCORE_CONCURRENCY }}
          AUTO_SCORE_MIN_SCORE: ${{ vars.AUTO_SCORE_MIN_SCORE }}
          AUTO_SCORE_RETRY_ATTEMPTS: ${{ vars.AUTO_SCORE_RETRY_ATTEMPTS }}
          NOTEBOOK_APPROX_VIOLATION_PENALTY: ${{ vars.NOTEBOOK_APPROX_VIOLATION_PENALTY }}
          NOTEBOOK_APPROX_MAX_VIOLATION_PENALTY: ${{ vars.NOTEBOOK_APPROX_MAX_VIOLATION_PENALTY }}
          NOTEBOOK_APPROX_SCORED_BONUS: ${{ vars.NOTEBOOK_APPROX_SCORED_BONUS }}
          NOTEBOOK_EXPLORE_UNSCORED_BASE: ${{ vars.NOTEBOOK_EXPLORE_UNSCORED_BASE }}
          NOTEBOOK_EXPLORE_RECENCY_WEIGHT: ${{ vars.NOTEBOOK_EXPLORE_RECENCY_WEIGHT }}
          WORKER_TASKS_QUEUE: ${{ vars.WORKER_TASKS_QUEUE }}
          WORKER_TASKS_DLQ: ${{ vars.WORKER_TASKS_DLQ }}
          TASKS_MAX_ATTEMPTS: ${{ vars.TASKS_MAX_ATTEMPTS }}
          TASKS_MIN_BACKOFF_SEC: ${{ vars.TASKS_MIN_BACKOFF_SEC }}
          TASKS_MAX_BACKOFF_SEC: ${{ vars.TASKS_MAX_BACKOFF_SEC }}
          TASKS_MAX_DOUBLINGS: ${{ vars.TASKS_MAX_DOUBLINGS }}
          TASKS_MAX_RETRY_DURATION_SEC: ${{ vars.TASKS_MAX_RETRY_DURATION_SEC }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          WORKER_ALLOWED_ORIGINS: ${{ vars.WORKER_ALLOWED_ORIGINS }}
          WORKER_CPU: ${{ vars.WORKER_CPU }}
          WORKER_MEMORY: ${{ vars.WORKER_MEMORY }}
          WORKER_MAX_INSTANCES: ${{ vars.WORKER_MAX_INSTANCES }}
          WORKER_MIN_INSTANCES: ${{ vars.WORKER_MIN_INSTANCES }}
          WEB_QUERY_STALE_TIME_MS: ${{ vars.WEB_QUERY_STALE_TIME_MS }}
          WEB_QUERY_REFETCH_ON_WINDOW_FOCUS: ${{ vars.WEB_QUERY_REFETCH_ON_WINDOW_FOCUS }}
          WEB_QUERY_DIAGNOSTICS_REFETCH_MS: ${{ vars.WEB_QUERY_DIAGNOSTICS_REFETCH_MS }}
          SCHEDULER_JOB_NAME: ${{ vars.SCHEDULER_JOB_NAME }}
          SCHEDULER_CRON: ${{ vars.SCHEDULER_CRON }}
          SCHEDULER_TIMEZONE: ${{ vars.SCHEDULER_TIMEZONE }}
          OPS_RECONCILE_JOB_NAME: ${{ vars.OPS_RECONCILE_JOB_NAME }}
          OPS_RECONCILE_CRON: ${{ vars.OPS_RECONCILE_CRON }}
          OPS_RECONCILE_TIMEZONE: ${{ vars.OPS_RECONCILE_TIMEZONE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          WORKER_SHARED_TOKEN: ${{ secrets.WORKER_SHARED_TOKEN }}
          WORKER_CALLBACK_TOKEN: ${{ secrets.WORKER_CALLBACK_TOKEN }}
          SCHEDULER_AUTH_TOKEN: ${{ secrets.SCHEDULER_AUTH_TOKEN }}
          OPS_INTERNAL_TOKEN: ${{ secrets.OPS_INTERNAL_TOKEN }}

      - name: Upload promotion verify summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promote-verify-summary
          path: promote-verify-summary.json
          if-no-files-found: warn
      - name: Upload promotion release metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promote-release-metadata
          path: promote-release-metadata.json
          if-no-files-found: warn
