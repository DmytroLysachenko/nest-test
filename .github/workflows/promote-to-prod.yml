name: Promote To Prod

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: 'Release commit SHA to promote'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Validate release input
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
          GCP_API_SERVICE: ${{ vars.GCP_API_SERVICE }}
          GCP_WORKER_SERVICE: ${{ vars.GCP_WORKER_SERVICE }}
          GCP_WEB_SERVICE: ${{ vars.GCP_WEB_SERVICE }}
          GCP_API_BASE_URL: ${{ vars.GCP_API_BASE_URL }}
          GCP_WORKER_BASE_URL: ${{ vars.GCP_WORKER_BASE_URL }}
          GCP_WEB_BASE_URL: ${{ vars.GCP_WEB_BASE_URL }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
        run: |
          chmod +x ./scripts/validate-deploy-contract.sh
          ./scripts/validate-deploy-contract.sh promote-to-prod
          require_https() {
            case "$1" in
              https://*) return 0 ;;
              *) echo "Expected https URL, got: $1" && return 1 ;;
            esac
          }
          test -n "${{ inputs.release_sha }}" || (echo "release_sha is required" && exit 1)
          echo "${{ inputs.release_sha }}" | grep -Eq '^[0-9a-f]{40}$' || (echo "release_sha must be a full 40-char git SHA" && exit 1)
          test -n "${{ vars.GCP_PROJECT_ID }}" || (echo "Missing vars.GCP_PROJECT_ID" && exit 1)
          test -n "${{ vars.GCP_REGION }}" || (echo "Missing vars.GCP_REGION" && exit 1)
          test -n "${{ vars.GAR_REPOSITORY }}" || (echo "Missing vars.GAR_REPOSITORY" && exit 1)
          test -n "${{ vars.GCP_API_SERVICE }}" || (echo "Missing vars.GCP_API_SERVICE" && exit 1)
          test -n "${{ vars.GCP_WORKER_SERVICE }}" || (echo "Missing vars.GCP_WORKER_SERVICE" && exit 1)
          test -n "${{ vars.GCP_WEB_SERVICE }}" || (echo "Missing vars.GCP_WEB_SERVICE" && exit 1)
          test -n "${{ vars.GCP_API_BASE_URL }}" || (echo "Missing vars.GCP_API_BASE_URL" && exit 1)
          test -n "${{ vars.GCP_WORKER_BASE_URL }}" || (echo "Missing vars.GCP_WORKER_BASE_URL" && exit 1)
          test -n "${{ vars.GCP_WEB_BASE_URL }}" || (echo "Missing vars.GCP_WEB_BASE_URL" && exit 1)
          require_https "${{ vars.GCP_API_BASE_URL }}" || exit 1
          require_https "${{ vars.GCP_WORKER_BASE_URL }}" || exit 1
          require_https "${{ vars.GCP_WEB_BASE_URL }}" || exit 1
          echo "Promoting release SHA=${{ inputs.release_sha }}"
      - name: Deploy API image
        run: |
          gcloud run deploy "${{ vars.GCP_API_SERVICE }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --image="${IMAGE_BASE}/api:${{ inputs.release_sha }}" \
            --platform=managed
      - name: Deploy Worker image
        run: |
          gcloud run deploy "${{ vars.GCP_WORKER_SERVICE }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --image="${IMAGE_BASE}/worker:${{ inputs.release_sha }}" \
            --platform=managed
      - name: Deploy Web image
        run: |
          gcloud run deploy "${{ vars.GCP_WEB_SERVICE }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --image="${IMAGE_BASE}/web:${{ inputs.release_sha }}" \
            --platform=managed
      - name: Capture promotion deployment metadata
        run: |
          resolve_revision() {
            gcloud run services describe "$1" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --region="${{ vars.GCP_REGION }}" \
              --format='value(status.latestReadyRevisionName)'
          }
          resolve_image() {
            gcloud run services describe "$1" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --region="${{ vars.GCP_REGION }}" \
              --format='value(spec.template.spec.containers[0].image)'
          }
          resolve_url() {
            gcloud run services describe "$1" \
              --project="${{ vars.GCP_PROJECT_ID }}" \
              --region="${{ vars.GCP_REGION }}" \
              --format='value(status.url)'
          }

          API_REVISION="$(resolve_revision "${{ vars.GCP_API_SERVICE }}")"
          WORKER_REVISION="$(resolve_revision "${{ vars.GCP_WORKER_SERVICE }}")"
          WEB_REVISION="$(resolve_revision "${{ vars.GCP_WEB_SERVICE }}")"
          API_IMAGE="$(resolve_image "${{ vars.GCP_API_SERVICE }}")"
          WORKER_IMAGE="$(resolve_image "${{ vars.GCP_WORKER_SERVICE }}")"
          WEB_IMAGE="$(resolve_image "${{ vars.GCP_WEB_SERVICE }}")"
          API_URL="$(resolve_url "${{ vars.GCP_API_SERVICE }}")"
          WORKER_URL="$(resolve_url "${{ vars.GCP_WORKER_SERVICE }}")"
          WEB_URL="$(resolve_url "${{ vars.GCP_WEB_SERVICE }}")"
          DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > promote-release-metadata.json <<JSON
          {
            "releaseSha": "${{ inputs.release_sha }}",
            "deployedAt": "${DEPLOYED_AT}",
            "api": {
              "service": "${{ vars.GCP_API_SERVICE }}",
              "url": "${API_URL}",
              "revision": "${API_REVISION}",
              "image": "${API_IMAGE}"
            },
            "worker": {
              "service": "${{ vars.GCP_WORKER_SERVICE }}",
              "url": "${WORKER_URL}",
              "revision": "${WORKER_REVISION}",
              "image": "${WORKER_IMAGE}"
            },
            "web": {
              "service": "${{ vars.GCP_WEB_SERVICE }}",
              "url": "${WEB_URL}",
              "revision": "${WEB_REVISION}",
              "image": "${WEB_IMAGE}"
            }
          }
JSON

          {
            echo "API_SERVICE_NAME=${{ vars.GCP_API_SERVICE }}"
            echo "WORKER_SERVICE_NAME=${{ vars.GCP_WORKER_SERVICE }}"
            echo "WEB_SERVICE_NAME=${{ vars.GCP_WEB_SERVICE }}"
            echo "API_DEPLOYED_URL=${API_URL}"
            echo "WORKER_DEPLOYED_URL=${WORKER_URL}"
            echo "WEB_DEPLOYED_URL=${WEB_URL}"
            echo "API_DEPLOYED_REVISION=${API_REVISION}"
            echo "WORKER_DEPLOYED_REVISION=${WORKER_REVISION}"
            echo "WEB_DEPLOYED_REVISION=${WEB_REVISION}"
            echo "API_DEPLOYED_IMAGE=${API_IMAGE}"
            echo "WORKER_DEPLOYED_IMAGE=${WORKER_IMAGE}"
            echo "WEB_DEPLOYED_IMAGE=${WEB_IMAGE}"
          } >> "${GITHUB_ENV}"
      - name: Post-deploy verify
        run: |
          chmod +x ./scripts/verify-deployment.sh
          RELEASE_SHA="${{ inputs.release_sha }}" \
          API_BASE_URL="${{ vars.GCP_API_BASE_URL }}" \
          WORKER_BASE_URL="${{ vars.GCP_WORKER_BASE_URL }}" \
          WEB_BASE_URL="${{ vars.GCP_WEB_BASE_URL }}" \
          VERIFY_SUMMARY_FILE="promote-verify-summary.json" \
          ./scripts/verify-deployment.sh

      - name: Upload promotion verify summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promote-verify-summary
          path: promote-verify-summary.json
          if-no-files-found: warn
      - name: Upload promotion release metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promote-release-metadata
          path: promote-release-metadata.json
          if-no-files-found: warn
